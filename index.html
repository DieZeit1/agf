<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#08285a">
  <title>Azərbaycan Güləş Federasiyası | Yarış Protokolu</title>
  <link rel="apple-touch-icon" href="agf.webp">
  <style>
    /* Стили остаются без изменений согласно вашему исходному коду */
    :root {
      --bg: #eef3f8; --paper: #fbfdff; --ink: #0b1733; --muted: #62718a;
      --line: #cfdae8; --blue: #08285a; --blue-2: #0e3b7a; --blue-soft: #e5eef9;
      --score-bg: #fff8e8; --score-border: #c99a2e; --gold: #c99a2e;
      --green: #1f7a53; --red: #bd2b3a; --shadow: 0 18px 45px rgba(8, 40, 90, 0.10);
      --radius: 8px; --tap: 46px; font-family: Arial, Helvetica, sans-serif;
    }
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); overflow-x: hidden; }
    body { font-size: 15px; line-height: 1.45; }
    button, input, textarea, select { font: inherit; }
    button { border: 0; min-height: var(--tap); border-radius: var(--radius); cursor: pointer; font-weight: 700; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    .topbar { background: var(--blue); color: #fff; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 20; }
    .topbar-inner { width: min(1180px, 100%); max-width: 100%; margin: 0 auto; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .mark { width: 42px; height: 42px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.32); display: grid; place-items: center; font-weight: 800; background: rgba(255,255,255,0.08); flex: 0 0 auto; }
    .brand { min-width: 0; flex: 1 1 auto; }
    .brand strong { display: block; font-size: 15px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; }
    .brand span { display: block; color: rgba(255,255,255,0.74); font-size: 12px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; }
    .top-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; flex: 0 0 auto; }
    .icon-btn { min-width: 42px; width: 42px; padding: 0; background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.18); }
    main { width: min(1180px, 100%); max-width: 100%; margin: 0 auto; padding: 18px 14px 40px; }
    .screen { display: none; } .screen.active { display: block; }
    /* Остальные стили из вашего Source 3... */
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar no-print">
      <div class="topbar-inner">
        <div class="mark">AGF</div>
        <div class="brand">
          <strong>Azərbaycan Güləş Federasiyası</strong>
          <span>Offline yarış protokolu</span>
        </div>
        <div class="top-actions">
          <button class="icon-btn" id="backNavBtn" title="Geri">‹</button>
          <button class="icon-btn" id="printBtn" title="Çap et">⎙</button>
        </div>
      </div>
    </header>

    <main>
      <!-- Секции экранов из вашего Source 3... -->
      <section class="screen active" id="homeScreen">
        <div class="hero">
          <div class="home-title">
            <h1>Yarış Protokolu</h1>
            <p>Çəkilər, püşk nömrələri, görüş cədvəli və çap protokolu tam offline saxlanılır.</p>
          </div>
          <div class="home-grid">
            <button class="primary" id="newCompetitionBtn">Yeni Yarış</button>
            <button class="secondary" id="competitionsBtn">Yarışlar</button>
          </div>
        </div>
      </section>
      <!-- Добавьте здесь остальные секции (setupScreen, listScreen, athleteScreen, weightScreen, protocolScreen) из Source 3 -->
    </main>
  </div>

  <!-- Модальное окно püşk -->
  <div class="modal no-print" id="drawModal" aria-hidden="true">
    <!-- Контент модалки из вашего Source 3... -->
  </div>

  <script>
    // Весь JS код из вашего Source 3 до функции installPwaBits() ...
    const STORE_KEY = 'agf_wrestling_competitions_v1';
    // ... функции loadCompetitions, saveCompetitions, uid, currentCompetition, showScreen, goBack, renderWeights и т.д.

    // ИСПРАВЛЕННЫЙ БЛОК: Защита от ошибок и авто-обновление PWA
    function installPwaBits() {
      const manifest = {
        name: 'AGF Yarış Protokolu',
        short_name: 'AGF Protokol',
        start_url: './index.html',
        display: 'standalone',
        background_color: '#ffffff',
        theme_color: '#08285a',
        icons: [
          { src: "agf.webp", sizes: '192x192', type: 'image/webp' },
          { src: "agf.webp", sizes: '512x512', type: 'image/webp' }
        ]
      };
      const manifestUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' }));
      const link = document.createElement('link');
      link.rel = 'manifest'; link.href = manifestUrl;
      document.head.appendChild(link);

      if ('serviceWorker' in navigator && location.protocol !== 'file:') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(reg => {
            console.log('SW OK');
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  window.location.reload();
                }
              };
            };
          }).catch(err => console.log('SW Error', err));
        });
      }
    }

    // ГЛАВНЫЙ ЗАПУСК: Выполняется только после полной отрисовки HTML
    window.addEventListener('load', () => {
      installPwaBits();
      if (typeof renderWeights === 'function') renderWeights();

      const safeBind = (id, event, fn) => {
        const el = document.getElementById(id);
        if (el) el.addEventListener(event, fn);
      };

      safeBind('newCompetitionBtn', 'click', resetSetup);
      safeBind('newFromListBtn', 'click', resetSetup);
      safeBind('competitionsBtn', 'click', () => { renderCompetitionList(); showScreen('list'); });
      safeBind('homeMarkBtn', 'click', () => { state.history = []; showScreen('home', { replace: true }); });
      safeBind('backNavBtn', 'click', goBack);
      safeBind('printBtn', 'click', () => window.print());
      
      safeBind('addWeightBtn', 'click', () => {
        const input = document.getElementById('newWeightInput');
        if (!input) return;
        const value = Number(input.value.replace(',', '.'));
        if (!value || state.tempWeights.includes(value)) return;
        state.tempWeights.push(value);
        state.availableWeights = [...new Set([...state.availableWeights, value])];
        input.value = ''; renderWeights();
      });

      safeBind('setupNextBtn', 'click', () => {
        const comp = createOrUpdateCompetition();
        if (!comp) return;
        const input = document.getElementById('athleteInput');
        if (input) input.value = comp.rawAthletes || '';
        renderCompetitionSummary(); showScreen('athletes');
      });

      safeBind('backToSetupBtn', 'click', () => {
        const comp = currentCompetition();
        if (comp) {
          const name = document.getElementById('competitionName');
          if (name) name.value = comp.name;
          state.tempWeights = [...comp.weights]; renderWeights();
        }
        showScreen('setup');
      });

      safeBind('splitWeightsBtn', 'click', () => {
        const comp = currentCompetition();
        const input = document.getElementById('athleteInput');
        if (!input || !comp) return;
        const parsed = parseAthletes(input.value, comp.weights);
        comp.rawAthletes = input.value; comp.athletes = parsed.athletes;
        saveCompetitions(); renderWeightProtocol(); showScreen('weights');
      });

      const list = document.getElementById('competitionsList');
      if (list) {
        list.addEventListener('click', (e) => {
          if (e.target.dataset.open) {
            state.currentId = e.target.dataset.open;
            renderWeightProtocol(); showScreen('weights');
          }
        });
      }
    });
  </script>
</body>
</html>
